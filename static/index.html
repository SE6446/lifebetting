<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiftBetting</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">    
    <script>
        window.onload = function() {
            window.valueUpdater = new ValueUpdater(150, 50);
        };
        if (localStorage.getItem('user_uuid')) {
            console.log('UUID already exists in LocalStorage:', localStorage.getItem('user_uuid'));
        } else {
            console.log('No UUID found in LocalStorage. Attempting to read from cookie...');

            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
            }

            const uuid = getCookie('temp_uuid');
            if (uuid) {
                localStorage.setItem('user_uuid', uuid);

                console.log('UUID saved to LocalStorage!');
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net"></script>
    <link rel="stylesheet" href="https://unpkg.com/uplot/dist/uPlot.min.css">
    <script src="https://unpkg.com/uplot/dist/uPlot.iife.min.js"></script>
    
</head>

<body>
    <nav class="navbar navbar-expand-lg shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">LifeBetting</a>
            <button class="navbar-toggler" id="start-btn" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <button class="btn btn-primary btn-lg" id="start-btn" onclick="toggleGame()">Start Game</button>
        </div>
    </nav>


    <div id="game-screen" class="fullPage">
        <div id="chart" width="800" height="400"></div>
        <div class="dashboard">
            <div class="box-graphBox">
                <span class="label">Life Trends</span>
                <div id="lifeChart"></div>
            </div>
            <div class="box-timerBox">
                <span class="label">Clock</span>
                <div id="timer" class="display-4">00:00</div>
            </div>

            <div class="box-scoreBox">
                <span class="label">Current Score</span>
                <div id="score" class="display-4">0</div>
            </div>
        </div>
    </div>
    <dialog id="BigChoices">
    <form method="dialog">
        <p id="promptText">Placeholder</p>
        <input type="text" id="promptInput">
        <button value="cancel">Cancel</button>
        <button value="default">Confirm</button>
    </form>
    </dialog>
</body>
<script src="render.js"></script>
<script src="game.js"></script>


</html>
